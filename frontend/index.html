<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHub - Student Learning Platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Auth Section -->
    <div id="auth" class="auth-wrapper">
        <div class="auth-card">
            
            <!-- Logo/Header -->
            <div class="auth-header">
                <div class="app-icon">📚</div>
                <h1>StudyHub</h1>
                <p class="tagline">Your Personal Learning Companion</p>
            </div>

            <!-- Tab Navigation -->
            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" onclick="switchTab('signup')">Create Account</button>
            </div>

            <!-- Login Form -->
            <div id="login" class="auth-form active">
                <form onsubmit="login(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input 
                            id="loginEmail" 
                            type="email"
                            placeholder="your@email.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input 
                            id="loginPassword" 
                            type="password"
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        Sign In
                    </button>
                </form>

                <p class="auth-footer">
                    Don't have an account? 
                    <a href="#" onclick="switchTab('signup'); return false;">Create one</a>
                </p>
            </div>

            <!-- Signup Form -->
            <div id="signup" class="auth-form">
                <form onsubmit="signup(event)">
                    <div class="form-group">
                        <label for="signupEmail">Email Address</label>
                        <input 
                            id="signupEmail" 
                            type="email"
                            placeholder="your@email.com"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input 
                            id="signupPassword" 
                            type="password"
                            placeholder="Create a strong password"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupConfirm">Confirm Password</label>
                        <input 
                            id="signupConfirm" 
                            type="password"
                            placeholder="Re-enter your password"
                            required
                        >
                    </div>

                    <p class="password-hint">
                        ✓ Use at least 8 characters
                    </p>

                    <button type="submit" class="btn btn-primary btn-block">
                        Create Account
                    </button>
                </form>

                <p class="auth-footer">
                    Already have an account? 
                    <a href="#" onclick="switchTab('login'); return false;">Sign in</a>
                </p>
            </div>

        </div>
    </div>

    <!-- Profile Section -->
    <div id="profile" class="profile-wrapper" style="display:none;">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar">👤</div>
                <h2>Welcome!</h2>
            </div>

            <div class="profile-content">
                <p class="profile-user" id="user"></p>
                <p class="profile-message">You're all set to start learning.</p>
            </div>

            <button onclick="logout()" class="btn btn-secondary btn-block">
                Sign Out
            </button>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
